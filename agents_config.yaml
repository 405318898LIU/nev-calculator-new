  - 历史项目归档
skills:
  - PDF生成 (pdf package)
  - Excel操作 (excel package)
  - 图表生成
  - 模板引擎
report_sections:
  - 项目概况
  - 政策依据
  - 财务指标汇总
  - 敏感性分析
  - 现金流表
  - 风险提示
  - 投决建议
decision_rules:
  pass: "IRR ≥ 门槛值 且 NPV > 0"
  warning: "IRR 在门槛值±0.5% 或 敏感系数>0.1"
  reject: "IRR < 门槛值-0.5% 或 NPV ≤ 0"
```

## Agent协作流程

```mermaid
sequenceDiagram
    participant User
    participant UI
    participant Policy
    participant Calc
    participant Sensitivity
    participant Report

    User->>UI: 输入项目信息
    UI->>Policy: 获取省份电价政策
    Policy-->>UI: 返回机制电价参数
    UI->>Calc: 提交计算请求
    Calc->>Calc: 执行财务计算
    Calc-->>UI: 返回IRR/NPV/回收期
    UI->>Sensitivity: 请求敏感性分析
    Sensitivity->>Sensitivity: 多维度计算
    Sensitivity-->>UI: 返回龙卷风图数据
    User->>UI: 点击生成报告
    UI->>Report: 请求生成投决会报告
    Report->>Report: 整合所有数据
    Report-->>UI: 返回PDF/Excel文件
    UI-->>User: 下载报告
```

## 数据结构定义

### 项目数据模型
```dart
class Project {
  // 基本信息
  String id;
  String name;
  ProjectType type; // 光伏/风电/储能
  double capacity; // MW
  DateTime operationDate; // 投运日期
  int constructionPeriod; // 建设期(月)
  int operationPeriod; // 运营期(年)
  String province;
  ProjectCategory category; // 存量/增量
  
  // 电价参数
  double mechanismPrice; // 机制电价 元/kWh
  double mechanismRatio; // 机制电量比例 %
  int mechanismPeriod; // 机制执行期限(年)
  double marketRatio; // 市场化交易比例 %
  double marketDiscount; // 市场化折价系数
  double greenCertificatePrice; // 绿证收益 元/kWh
  
  // 资源参数
  double utilizationHours; // 年利用小时
  double degradationRate; // 首年衰减率 %
  double annualDegradation; // 年衰减率 %
  
  // 投资参数
  double totalInvestment; // 万元
  double unitInvestment; // 元/W
  double equityRatio; // 资本金比例 %
  double loanRate; // 贷款利率 %
  int loanTerm; // 贷款期限(年)
  
  // 成本参数
  double omcCost; // 运维成本 元/W/年
  double insuranceRate; // 保险费率 %
  double taxRate; // 所得税率 %
  double vatRate; // 增值税率 %
  double surtaxRate; // 附加税率 %
  
  // 计算结果
  CalculationResult result;
}
```

### 计算结果模型
```dart
class CalculationResult {
  // 核心指标
  double irrBeforeTax; // 税前全投资IRR %
  double irrEquity; // 税后资本金IRR %
  double npv; // 净现值 万元
  double lcoe; // 平准化度电成本 元/kWh
  double dynamicPayback; // 动态投资回收期 年
  double staticPayback; // 静态投资回收期 年
  
  // 现金流
  List<double> annualCashFlow; // 年度净现金流
  List<double> cumulativeCashFlow; // 累计现金流
  double maxFundingGap; // 最大资金缺口
  
  // 年度指标
  List<YearlyIndicator> yearlyData;
}

class YearlyIndicator {
  int year;
  double generation; // 发电量 万kWh
  double revenue; // 收入 万元
  double omc; // 运维成本 万元
  double depreciation; // 折旧 万元
  double interest; // 利息 万元
  double tax; // 所得税 万元
  double netProfit; // 净利润 万元
  double cashFlow; // 净现金流 万元
}
```

