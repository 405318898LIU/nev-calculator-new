# 新能源投资收益计算器 - Agent配置文件

## 项目概述
多Agent协作的新能源项目投资决策辅助系统
支持平台: Android、Windows
技术栈: Flutter + Dart

## Agent角色定义

### 1. UI Agent (界面协调员)
```yaml
agent_id: ui_agent
name: 界面协调员
role: 用户交互入口，负责界面渲染和状态管理
responsibilities:
  - 表单数据收集与校验
  - 界面导航和路由管理
  - 用户操作响应
  - 数据可视化展示
  - 与其他Agent的协调通信
skills:
  - Flutter UI开发
  - 状态管理 (Provider/Riverpod)
  - 响应式布局
  - 本地存储 (SharedPreferences/Hive)
```

