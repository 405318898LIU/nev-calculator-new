### 3. Calc Engine (计算核心)
```yaml
agent_id: calc_engine
name: 计算核心
role: 财务模型计算与现金流分析
responsibilities:
  - 全投资现金流建模
  - IRR/NPV计算
  - LCOE计算
  - 投资回收期计算
  - 资本金现金流分析
skills:
  - 财务数学模型
  - 迭代算法实现
  - 高精度计算
algorithms:
  irr_calculation: Newton-Raphson迭代法
  npv_calculation: 现金流折现
  lcoe_calculation: 全生命周期成本/总发电量
key_formulas:
  npv: "∑(CF_t / (1+r)^t) - InitialInvestment"
  irr: "使NPV=0的折现率r"
  lcoe: "(总投资现值+运维现值) / 总发电量现值"
  dynamic_payback: "累计折现现金流转正的年份"
```

### 4. Sensitivity Agent (敏感分析员)
```yaml
agent_id: sensitivity_agent
name: 敏感分析员
role: 多维度敏感性分析与风险评估
responsibilities:
  - 龙卷风图生成
  - 单因素敏感性分析
  - 情景分析(乐观/基准/悲观)
  - 盈亏平衡点计算
  - 关键参数识别
skills:
  - 数据分析
  - 统计建模
  - 可视化
analysis_dimensions:
  - 上网电价 ±20%
  - 利用小时数 ±15%
  - 初始投资 ±15%
  - 运维成本 ±20%
  - 融资成本 ±2%
  - 建设期 ±1年
output:
  - 敏感性排序
  - 临界值分析
  - 风险等级评估
```

### 5. Report Agent (报告生成员)
```yaml
agent_id: report_agent
name: 报告生成员
role: 投决会报告生成与导出
responsibilities:
  - PDF报告生成
  - Excel模型导出
  - 图表渲染
