## 投决会门槛值参考

| 项目类型 | 税前全投资IRR门槛 | 税后资本金IRR门槛 | 投资回收期上限 |
|---------|------------------|------------------|--------------|
| 集中式光伏 | ≥6.5% | ≥8% | 10年 |
| 分布式光伏 | ≥7% | ≥9% | 9年 |
| 陆上风电 | ≥6.5% | ≥8% | 10年 |
| 海上风电 | ≥6% | ≥7.5% | 12年 |
| 储能电站 | ≥6% | ≥7% | 8年 |
| 大基地项目 | ≥6% | ≥7.5% | 12年 |

> 注：以上标准参考大唐集团等发电集团最新投决要求
